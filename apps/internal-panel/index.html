<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>internal-panel</title>
    <script>
      (function () {
        var themeKey = 'fuel-carrier:internal-panel:theme';
        var localeKey = 'fuel-carrier:internal-panel:locale';
        var t = localStorage.getItem(themeKey);
        var prefersDark = matchMedia('(prefers-color-scheme:dark)').matches;
        var isDark =
          t === 'dark' ||
          ((!t || t === 'system') && prefersDark);
        document.documentElement.setAttribute(
          'data-theme',
          isDark ? 'internal-dark' : 'internal-light'
        );

        var l = localStorage.getItem(localeKey);
        var locale =
          l ||
          (navigator.language.toLowerCase().indexOf('en') === 0 ? 'en' : 'fa');
        document.documentElement.lang = locale;
        document.documentElement.dir = locale === 'fa' ? 'rtl' : 'ltr';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
